name: '🐳 Professional: Pull & Save Docker Image'

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '📦 Docker image name (e.g., nginx:latest, ubuntu:22.04)'
        required: true
        type: string
      registry_url:
        description: '🏢 Custom registry URL (optional, leave empty for Docker Hub)'
        required: false
        type: string
        default: ''
      registry_username:
        description: '👤 Registry username (optional)'
        required: false
        type: string
        default: ''
      registry_password:
        description: '🔐 Registry password (optional)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 Split size per chunk (default: 95m) e.g., 95m, 100m, 200m'
        required: false
        type: string
        default: '95m'
      compress:
        description: '🗜️ Compress with gzip? (true/false)'
        required: false
        type: string
        default: 'true'

permissions:
  contents: write  # Important: allow push to repository

jobs:
  pull-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pigz pv
          # Install Docker
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo usermod -aG docker $USER

      - name: 🔑 Login to registry (if needed)
        if: ${{ github.event.inputs.registry_url != '' && github.event.inputs.registry_username != '' }}
        run: |
          echo "${{ github.event.inputs.registry_password }}" | docker login "${{ github.event.inputs.registry_url }}" \
            --username "${{ github.event.inputs.registry_username }}" \
            --password-stdin

      - name: 📥 Pull Docker image
        id: pull
        run: |
          IMAGE="${{ github.event.inputs.image_name }}"
          echo "Pulling image: $IMAGE"
          
          # If custom registry is provided
          if [ -n "${{ github.event.inputs.registry_url }}" ]; then
            FULL_IMAGE="${{ github.event.inputs.registry_url }}/$IMAGE"
          else
            FULL_IMAGE="$IMAGE"
          fi
          
          docker pull "$FULL_IMAGE"
          if [ $? -ne 0 ]; then exit 1; fi
          
          # Save image name for next step
          echo "FULL_IMAGE=$FULL_IMAGE" >> $GITHUB_ENV
          
          # Create safe filename
          SAFE_NAME=$(echo "$IMAGE" | sed 's/[\\/:*?"<>|]/_/g' | sed 's/:/_/g')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "✅ Successfully pulled: $FULL_IMAGE"

      - name: 💾 Save image to tar file
        id: save
        run: |
          # Final directory: docker-images/image-name/
          FINAL_DIR="docker-images/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"
          
          # Remove previous files
          rm -f "$FINAL_DIR"/*.tar*
          
          # Save image as tar
          TAR_FILE="$FINAL_DIR/image.tar"
          docker save "${{ env.FULL_IMAGE }}" -o "$TAR_FILE"
          
          # Display file info
          echo "📊 Tar file size:"
          ls -lh "$TAR_FILE"
          
          # Compress if requested
          if [ "${{ github.event.inputs.compress }}" = "true" ]; then
            echo "🗜️ Compressing with gzip..."
            
            # Parallel compression with pigz for speed
            pigz -6 -p 4 "$TAR_FILE"
            COMPRESSED_FILE="${TAR_FILE}.gz"
            
            # Remove original tar file
            rm -f "$TAR_FILE"
            
            echo "✅ Compressed file:"
            ls -lh "$COMPRESSED_FILE"
            
            # Split if file is large
            FILE_SIZE=$(stat -c%s "$COMPRESSED_FILE")
            SPLIT_SIZE_BYTES=$(echo "${{ github.event.inputs.split_size }}" | sed 's/m/*1048576/' | sed 's/g/*1073741824/' | bc)
            
            if [ $FILE_SIZE -gt $SPLIT_SIZE_BYTES ]; then
              echo "📦 Splitting file into ${{ github.event.inputs.split_size }} chunks"
              cd "$FINAL_DIR"
              split -b "${{ github.event.inputs.split_size }}" -d "image.tar.gz" "image.tar.gz.part"
              rm -f "image.tar.gz"
              echo "✅ File split into parts:"
              ls -lh image.tar.gz.part*
              cd -
            fi
          else
            # If not compressing, check if tar needs splitting
            FILE_SIZE=$(stat -c%s "$TAR_FILE")
            SPLIT_SIZE_BYTES=$(echo "${{ github.event.inputs.split_size }}" | sed 's/m/*1048576/' | sed 's/g/*1073741824/' | bc)
            
            if [ $FILE_SIZE -gt $SPLIT_SIZE_BYTES ]; then
              echo "📦 Splitting file into ${{ github.event.inputs.split_size }} chunks"
              cd "$FINAL_DIR"
              split -b "${{ github.event.inputs.split_size }}" -d "image.tar" "image.tar.part"
              rm -f "image.tar"
              echo "✅ File split into parts:"
              ls -lh image.tar.part*
              cd -
            fi
          fi
          
          # Output for later steps
          echo "FINAL_DIR=$FINAL_DIR" >> $GITHUB_ENV

      - name: 📝 Create metadata file
        run: |
          FINAL_DIR="${{ env.FINAL_DIR }}"
          
          # Create info file
          cat > "$FINAL_DIR/README.md" << EOF
          # Docker Image: ${{ github.event.inputs.image_name }}
          
          ## Image Information
          - **Original Name**: ${{ github.event.inputs.image_name }}
          - **Full Address**: ${{ env.FULL_IMAGE }}
          - **Download Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Compression**: ${{ github.event.inputs.compress }}
          - **Chunk Size**: ${{ github.event.inputs.split_size }}
          
          ## How to Restore the Image
          
          ### If compressed with gzip
          \`\`\`bash
          # For single compressed file
          gunzip -c image.tar.gz | docker load
          
          # If split into parts
          cat image.tar.gz.part* | gunzip | docker load
          \`\`\`
          
          ### If uncompressed tar file
          \`\`\`bash
          # Regular tar file
          docker load -i image.tar
          
          # If split into parts
          cat image.tar.part* > image.tar
          docker load -i image.tar
          \`\`\`
          
          ## Useful Commands
          - **View loaded images**: \`docker images\`
          - **Run container from this image**: \`docker run -it ${{ github.event.inputs.image_name }}\`
          
          ## Technical Information
          - **OS**: Ubuntu 22.04
          - **File Created**: $(date -Iseconds)
          EOF
          
          # Save image inspection data
          docker inspect "${{ env.FULL_IMAGE }}" > "$FINAL_DIR/image_info.json" 2>/dev/null || echo "Unable to save image info"
          
          echo "✅ Metadata saved"

      - name: 📝 Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-images/
          git commit -m "🐳 Add Docker image: ${{ github.event.inputs.image_name }}
          
Image: ${{ env.FULL_IMAGE }}
Size: $(du -sh ${{ env.FINAL_DIR }} | cut -f1)
Compressed: ${{ github.event.inputs.compress }}" || echo "Nothing to commit"
          git push
          
      - name: 🧹 Cleanup temporary files
        if: always()
        run: |
          # Remove local images to free space
          docker rmi "${{ env.FULL_IMAGE }}" || true
          docker system prune -f || true
          echo "✅ Cleanup completed"

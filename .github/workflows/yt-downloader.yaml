name: '📥 YouTube Download & Archive'

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: '🔗 YouTube video URL'
        required: true
        type: string
      format:
        description: '📁 Format (video/audio)'
        required: false
        type: choice
        default: 'video'
        options:
          - 'video'
          - 'audio'
      quality:
        description: '🎬 Quality (best, 1080p, 720p, 480p, worst)'
        required: false
        type: string
        default: 'best'
      password:
        description: '🔐 Zip password (optional)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 Split size per part (default: 95m) e.g., 95m, 100m, 200m'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-youtube-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file
          sudo apt-get install -y ffmpeg  # Required for youtube-dl/yt-dlp
          
      - name: 📥 Install yt-dlp (YouTube downloader)
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 📊 Download from YouTube
        id: download
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          echo "Downloading from: $URL"
          echo "Format: $FORMAT | Quality: $QUALITY"
          
          # Set yt-dlp options based on format
          if [ "$FORMAT" = "audio" ]; then
            yt-dlp -f "bestaudio" --extract-audio --audio-format mp3 \
                   --output "downloaded_file.%(ext)s" "$URL"
          else
            # For video, ensure we get video+audio
            if [ "$QUALITY" = "best" ]; then
              yt-dlp -f "bestvideo+bestaudio" --merge-output-format mp4 \
                     --output "downloaded_file.%(ext)s" "$URL"
            else
              yt-dlp -f "bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]" \
                     --merge-output-format mp4 \
                     --output "downloaded_file.%(ext)s" "$URL"
            fi
          fi
          
          # Get the actual downloaded filename
          DOWNLOADED_FILE=$(ls downloaded_file.* 2>/dev/null | head -n1)
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          mv "$DOWNLOADED_FILE" downloaded_file
          ls -lh downloaded_file
          
          # Extract video title for folder name
          TITLE=$(yt-dlp --get-title "$URL" | sed 's/[\\/:*?"<>|]/_/g')
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      - name: 🧠 Detect file type and prepare folder
        id: classify
        run: |
          # Sanitize title for folder name
          if [ -z "${{ env.TITLE }}" ]; then
            SAFE_NAME="youtube_video_$(date +%Y%m%d_%H%M%S)"
          else
            SAFE_NAME="${{ env.TITLE }}"
          fi
          
          # Remove invalid characters
          SAFE_NAME=$(echo "$SAFE_NAME" | sed 's/[\\/:*?"<>|]/_/g')
          
          # Set category based on format choice
          if [ "${{ github.event.inputs.format }}" = "audio" ]; then
            CAT="audio"
          else
            CAT="video"
          fi
          
          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "✅ Category: $CAT → Subfolder: $SAFE_NAME"

      - name: 🗜️ Compress and split (with optional password)
        run: |
          # Final directory: downloads/category/video_title/
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"
          
          # Remove existing files in that subfolder to avoid conflicts
          rm -f "$FINAL_DIR"/*.7z*
          
          # Compression
          if [ -z "${{ github.event.inputs.password }}" ]; then
            7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          else
            7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          fi
          
          echo "✅ File saved in $FINAL_DIR"
          ls -lh "$FINAL_DIR"

      - name: 📝 Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add YouTube download: ${{ env.SAFE_NAME }} (format: ${{ github.event.inputs.format }})" || echo "Nothing to commit"
          git push

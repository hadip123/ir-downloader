name: '📥 YouTube Download & Archive (Auto-format)'

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: '🔗 YouTube video URL'
        required: true
        type: string
      format:
        description: '📁 Format (video/audio)'
        required: false
        type: choice
        default: 'video'
        options:
          - 'video'
          - 'audio'
      quality:
        description: '🎬 Quality preference (best, 1080p, 720p, 480p, worst)'
        required: false
        type: string
        default: 'best'
      password:
        description: '🔐 Zip password (optional)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 Split size per part (default: 95m)'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-youtube-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file ffmpeg

      - name: 📥 Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: 🍪 Set up cookies (if available)
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies loaded"
          fi

      - name: 📊 Download from YouTube (Auto-format fallback)
        id: download
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          echo "Downloading from: $URL"
          echo "Format: $FORMAT | Preferred quality: $QUALITY"
          
          # Base yt-dlp command
          YT_CMD="yt-dlp --no-check-certificate"
          
          # Add cookies if available
          [ -f "cookies.txt" ] && YT_CMD="$YT_CMD --cookies cookies.txt"
          
          # Download with automatic fallback formats
          if [ "$FORMAT" = "audio" ]; then
            # Try bestaudio, fallback to any audio
            $YT_CMD -f "bestaudio/best" \
                   --extract-audio --audio-format mp3 \
                   --output "downloaded_file.%(ext)s" "$URL" || \
            $YT_CMD -f "worstaudio/worst" \
                   --extract-audio --audio-format mp3 \
                   --output "downloaded_file.%(ext)s" "$URL"
          else
            # Video download with progressive fallbacks
            case "$QUALITY" in
              "best")
                # Try best video+audio combo, fallback to best single format
                $YT_CMD -f "bestvideo+bestaudio/best" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL" || \
                $YT_CMD -f "best" \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
              "1080p")
                $YT_CMD -f "bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL" || \
                $YT_CMD -f "best[height<=1080]" \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
              "720p")
                $YT_CMD -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL" || \
                $YT_CMD -f "best[height<=720]" \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
              "480p")
                $YT_CMD -f "bestvideo[height<=480]+bestaudio/best[height<=480]/best" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL" || \
                $YT_CMD -f "best[height<=480]" \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
              "worst")
                $YT_CMD -f "worstvideo+worstaudio/worst" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
              *)
                # Custom quality or default to best
                $YT_CMD -f "bestvideo[height<=${QUALITY}]+bestaudio/best[height<=${QUALITY}]/best" \
                       --merge-output-format mp4 \
                       --output "downloaded_file.%(ext)s" "$URL" || \
                $YT_CMD -f "best" \
                       --output "downloaded_file.%(ext)s" "$URL"
                ;;
            esac
          fi
          
          # Check if download succeeded
          DOWNLOADED_FILE=$(ls downloaded_file.* 2>/dev/null | head -n1)
          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "❌ Download failed! Checking available formats..."
            yt-dlp --list-formats "$URL"
            exit 1
          fi
          
          mv "$DOWNLOADED_FILE" downloaded_file
          ls -lh downloaded_file
          
          # Extract video title
          TITLE=$(yt-dlp --get-title "$URL" 2>/dev/null | sed 's/[\\/:*?"<>|]/_/g')
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      - name: 🧠 Prepare folder structure
        run: |
          if [ -z "${{ env.TITLE }}" ]; then
            SAFE_NAME="youtube_video_$(date +%Y%m%d_%H%M%S)"
          else
            SAFE_NAME="${{ env.TITLE }}"
          fi
          
          SAFE_NAME=$(echo "$SAFE_NAME" | sed 's/[\\/:*?"<>|]/_/g')
          
          if [ "${{ github.event.inputs.format }}" = "audio" ]; then
            CAT="audio"
          else
            CAT="video"
          fi
          
          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "✅ Category: $CAT → Subfolder: $SAFE_NAME"

      - name: 🗜️ Compress and split
        run: |
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.SAFE_NAME }}"
          mkdir -p "$FINAL_DIR"
          
          rm -f "$FINAL_DIR"/*.7z*
          
          if [ -z "${{ github.event.inputs.password }}" ]; then
            7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          else
            7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./downloaded_file"
          fi
          
          echo "✅ File saved in $FINAL_DIR"
          ls -lh "$FINAL_DIR"

      - name: 📝 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add YouTube download: ${{ env.SAFE_NAME }}" || echo "Nothing to commit"
          git push
